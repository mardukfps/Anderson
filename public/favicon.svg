<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer Ring - Journey and Clock concept -->
  <circle 
    cx="50" 
    cy="50" 
    r="44" 
    stroke="#38BDF8" 
    stroke-width="8" 
    stroke-linecap="round"
    stroke-dasharray="220 50"
    opacity="0.2"
  />
  
  <!-- Active Arc - Progress -->
  <path
    d="M15 75 A44 44 0 0 1 50 6"
    stroke="#38BDF8"
    stroke-width="10"
    stroke-linecap="round"
  />

  <!-- Growth Bars - Financial Conversion -->
  <rect x="30" y="55" width="8" height="15" rx="2" fill="#38BDF8" opacity="0.4" />
  <rect x="46" y="45" width="8" height="25" rx="2" fill="#38BDF8" opacity="0.7" />
  <rect x="62" y="32" width="8" height="38" rx="2" fill="#38BDF8" />

  <!-- The Plus Branding -->
  <path 
    d="M80 10V30M70 20H90" 
    stroke="#38BDF8" 
    stroke-width="12" 
    stroke-linecap="round" 
  />
</svg>
