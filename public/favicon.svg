<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Main Circle - Clock Face -->
  <circle 
    cx="50" 
    cy="50" 
    r="42" 
    stroke="#38BDF8" 
    stroke-width="6" 
    opacity="0.2"
  />

  <!-- Hour markers -->
  <line x1="50" y1="18" x2="50" y2="12" stroke="#38BDF8" stroke-width="4" stroke-linecap="round" opacity="0.3" />
  <line x1="82" y1="50" x2="88" y2="50" stroke="#38BDF8" stroke-width="4" stroke-linecap="round" opacity="0.3" />
  <line x1="50" y1="82" x2="50" y2="88" stroke="#38BDF8" stroke-width="4" stroke-linecap="round" opacity="0.3" />
  <line x1="18" y1="50" x2="12" y2="50" stroke="#38BDF8" stroke-width="4" stroke-linecap="round" opacity="0.3" />

  <!-- Checkmark Clock Hands -->
  <g transform="translate(50, 50)">
    <path
      d="M-15 0 L0 15 L30 -25"
      stroke="#38BDF8"
      stroke-width="10"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>
  
  <!-- Center reflection/point -->
  <circle cx="50" cy="50" r="3" fill="#38BDF8" />
</svg>
